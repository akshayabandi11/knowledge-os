version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: knowledge-os-db-dev
    environment:
      POSTGRES_DB: knowledge_os
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - kos-dev-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: knowledge-os-backend-dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      POSTGRES_SERVER: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: knowledge_os
      JWT_SECRET_KEY: dev_jwt_key_secret_code
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ENVIRONMENT: dev
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - kos-dev-network
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: knowledge-os-frontend-dev
    working_dir: /app
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - kos-dev-network
    restart: unless-stopped

volumes:
  postgres_dev_data:

networks:
  kos-dev-network:
    driver: bridge
