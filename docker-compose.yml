version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: knowledgeos_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: knowledgeos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d knowledgeos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
